<div class="p-4 user-profile-menu relative">
  <div
    class="bg-purple-800 rounded-2xl p-4 flex items-center gap-3 cursor-pointer hover:bg-purple-700 transition"
    (click)="toggleMenu()"
  >
    <img src="https://i.pravatar.cc/100" class="w-12 h-12 rounded-full object-cover" />
    <div class="flex-1 min-w-0">
      <p class="font-semibold text-white truncate">{{ userName() }}</p>
      <p class="text-sm text-purple-200 truncate">{{ userRole() }}</p>
    </div>
    <span
      class="pi pi-chevron-down text-purple-200 text-xs transition-transform duration-200"
      [class.rotate-180]="menuOpen()"
    ></span>
  </div>

  @if (menuOpen()) {
    <div
      class="absolute left-4 right-4 bottom-full mb-2 bg-purple-50 rounded-xl shadow-lg overflow-hidden z-50 border border-gray-100"
    >
      <ul class="py-1 text-gray-700 text-sm">
        <li>
          <button
            (click)="changePassword()"
            class="w-full flex items-center gap-3 px-4 py-3 bg-purple-100 hover:bg-purple-300 transition hover:cursor-pointer"
          >
            <span class="pi pi-lock text-purple-600"></span>
            Change Password
          </button>
        </li>
        <li>
          <button
            (click)="uploadProfilePicture()"
            class="w-full flex items-center gap-3 px-4 py-3 bg-purple-100 hover:bg-purple-300 transition hover:cursor-pointer"
          >
            <span class="pi pi-image text-purple-600"></span>
            Upload Profile Picture
          </button>
        </li>
        <li>
          <button
            (click)="linkSchool()"
            class="w-full flex items-center gap-3 px-4 py-3 bg-purple-100 hover:bg-purple-300 transition hover:cursor-pointer"
          >
            <span class="pi pi-building text-purple-600"></span>
            Link School
          </button>
        </li>
        <li class="border-t border-purple-100">
          <button
            (click)="logout()"
            class="w-full flex items-center gap-3 px-4 py-3 bg-purple-100 hover:bg-red-100 text-red-500 transition hover:cursor-pointer"
          >
            <span class="pi pi-sign-out text-red-500"></span>
            Logout
          </button>
        </li>
      </ul>
    </div>
  }
</div>
