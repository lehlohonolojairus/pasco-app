<div class="p-l user-profile-menu relative">
  <div
    class="bg-[#09050E]/20 rounded-card p-m flex items-center gap-m cursor-pointer hover:bg-white/20 transition-colors duration-200"
    (click)="toggleMenu()"
  >
    <div class="avatar-xl shrink-0">
      @if (isValidUrl(profilePictureUrl())) {
        <img [src]="profilePictureUrl()" alt="Profile Picture" class="w-full h-full object-cover rounded-full" />
      } @else {
        {{ userName() | slice:0:2 | uppercase }}
      }
    </div>
    <div class="flex-1 min-w-0">
      <p class="text-body-sm font-semibold text-white truncate">{{ userName() }}</p>
      <p class="text-caption text-accent-mint truncate">{{ userRole() }}</p>
    </div>
    <span
      class="pi pi-chevron-down text-white/60 text-xs transition-transform duration-200"
      [class.rotate-180]="menuOpen()"
    ></span>
  </div>

  @if (menuOpen()) {
    <div
      class="absolute left-l right-l bottom-full mb-s bg-white rounded-card shadow-modal overflow-hidden z-50 border border-neutral-300"
    >
      <ul class="py-xs text-body-sm">
        <li>
          <button
            (click)="changePassword()"
            class="w-full flex items-center gap-m px-l py-m text-neutral-700 hover:bg-neutral-100 transition-colors cursor-pointer"
          >
            <span class="pi pi-lock text-primary-indigo"></span>
            Change Password
          </button>
        </li>
        <li>
          <button
            (click)="uploadProfilePicture()"
            class="w-full flex items-center gap-m px-l py-m text-neutral-700 hover:bg-neutral-100 transition-colors cursor-pointer"
          >
            <span class="pi pi-image text-primary-indigo"></span>
            Upload Profile Picture
          </button>
        </li>
        <li>
          <a routerLink="/layout/user/schools"
            (click)="linkSchool()"
            class="w-full flex items-center gap-m px-l py-m text-neutral-700 hover:bg-neutral-100 transition-colors cursor-pointer"
          >
            <span class="pi pi-building text-primary-indigo"></span>
            Schools
        </a>
        </li>
        <li class="border-t border-neutral-300">
          <button
            (click)="logout()"
            class="w-full flex items-center gap-m px-l py-m text-status-error hover:bg-[#FFEBEE] transition-colors cursor-pointer"
          >
            <span class="pi pi-sign-out text-status-error"></span>
            Logout
          </button>
        </li>
      </ul>
    </div>
  }
</div>
