<div class="flex flex-col gap-l p-l">
  <!-- Preview Area -->
  <div class="flex flex-col items-center gap-m">
    @if (previewUrl()) {
      <div class="relative">
        <img
          [src]="previewUrl()"
          alt="Profile preview"
          class="w-28 h-28 rounded-full object-cover border-2 border-primary-indigo shadow-md"
        />
        <button
          (click)="clearSelection()"
          class="absolute -top-1 -right-1 bg-status-error text-white rounded-full w-6 h-6 flex items-center justify-center hover:opacity-80 transition-opacity"
          title="Remove"
        >
          <span class="pi pi-times text-xs"></span>
        </button>
      </div>
    } @else {
      <div
        class="w-28 h-28 rounded-full bg-neutral-100 border-2 border-dashed border-neutral-300 flex items-center justify-center"
      >
        <span class="pi pi-image text-neutral-400 text-3xl"></span>
      </div>
    }

    @if (selectedFile()) {
      <p class="text-caption text-neutral-500 truncate max-w-xs">{{ selectedFile()!.name }}</p>
    }
  </div>

  <!-- File Input -->
  <div class="flex flex-col gap-xs">
    <label class="text-body-sm font-medium text-neutral-700">Select Image</label>
    <label
      class="flex items-center justify-center gap-m border border-neutral-300 rounded-card px-l py-m cursor-pointer hover:bg-neutral-50 transition-colors text-body-sm text-neutral-600"
    >
      <span class="pi pi-upload text-primary-indigo"></span>
      <span>{{ selectedFile() ? 'Change Image' : 'Browse File' }}</span>
      <input
        type="file"
        accept="image/jpeg,image/png,image/gif,image/webp"
        class="hidden"
        (change)="onFileSelected($event)"
      />
    </label>
    <p class="text-caption text-neutral-400">
      Accepted formats: JPEG, PNG, GIF, WEBP. Max size: 5MB.
    </p>
  </div>

  <!-- Error Message -->
  @if (errorMessage()) {
    <div
      class="flex items-center gap-s px-m py-s bg-[#FFEBEE] rounded-card border border-status-error/30"
    >
      <span class="pi pi-exclamation-circle text-status-error text-sm"></span>
      <p class="text-body-sm text-status-error">{{ errorMessage() }}</p>
    </div>
  }

  <!-- Success Message -->
  @if (successMessage()) {
    <div
      class="flex items-center gap-s px-m py-s bg-[#E8F5E9] rounded-card border border-status-success/30"
    >
      <span class="pi pi-check-circle text-status-success text-sm"></span>
      <p class="text-body-sm text-status-success">{{ successMessage() }}</p>
    </div>
  }

  <!-- Upload Button -->
  <button
    (click)="upload()"
    [disabled]="!selectedFile() || isUploading()"
    class="w-full flex items-center justify-center gap-m px-l py-m bg-primary-indigo text-white rounded-card font-semibold text-body-sm transition-opacity hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed"
  >
    @if (isUploading()) {
      <span class="pi pi-spin pi-spinner"></span>
      Uploading...
    } @else {
      <span class="pi pi-upload"></span>
      Upload Picture
    }
  </button>
</div>
