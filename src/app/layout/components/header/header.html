<header class="border-b border-gray-200 py-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-4xl font-bold text-[#4C0382]">
        {{ appStateService.pageTitle() }}
      </h1>
    </div>

    <div class="flex items-center gap-6">
      <div class="relative inline-block text-left" (click)="toggleMenu()">
        <!-- Button -->
        <button
          class="flex items-center px-4 py-2 bg-purple-800 text-white rounded hover:bg-purple-900"
        >
          <span>Options</span>
          <!-- Chevron Icon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-4 h-4 ml-2 transform transition-transform duration-200"
            [ngClass]="{ 'rotate-180': isOpen }"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 9l-7 7-7-7"
            />
          </svg>
        </button>

        <!-- Dropdown Menu -->
        @if (isOpen) {
          <div class="absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded shadow-lg">
            <a href="#" class="block px-4 py-2 hover:bg-gray-100">Profile</a>
            <a href="#" class="block px-4 py-2 hover:bg-gray-100">Settings</a>
            <a href="#" class="block px-4 py-2 hover:bg-gray-100">Logout</a>
          </div>
        }
      </div>
    </div>
  </div>
</header>
