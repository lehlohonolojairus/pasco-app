<header class="ml-5 mr-5 border-b border-gray-300 h-16 px-xl flex items-center justify-between">
  <h1 class="text-h2 text-pasco-purple font-semibold">
    {{ appStateService.pageTitle() }}
  </h1>

  <div class="flex items-center gap-l">
    <!-- Notifications -->
    <button class="relative btn-ghost px-m py-m border-0 ">
      <i class="pi pi-bell text-neutral-700"></i>
      <span class="absolute top-1 right-1 w-2 h-2 bg-status-error rounded-full"></span>
    </button>

    <!-- Quick Actions -->
    <div class="flex items-center rounded-btn overflow-hidden shadow-fab">
      <button class="bg-primary-indigo hover:bg-primary-indigo-dark transition-colors text-white text-body-sm font-medium px-l py-m cursor-pointer">
        Quick Actions
      </button>
      <div class="w-px h-full bg-white/20"></div>
      <button
        (click)="toggleMenu()"
        class="bg-primary-indigo hover:bg-primary-indigo-dark transition-colors text-white px-m py-m cursor-pointer"
      >
        <span
          class="pi pi-chevron-down text-xs transition-transform duration-200"
          [class.rotate-180]="isOpen"
        ></span>
      </button>
    </div>

    <!-- Dropdown -->
    @if (isOpen) {
      <div class="absolute right-6 top-14 mt-s w-48 bg-white border border-neutral-300 rounded-card shadow-modal z-50">
        <a class="block px-l py-m text-body-sm text-neutral-700 hover:bg-neutral-100 cursor-pointer">Profile</a>
        <a class="block px-l py-m text-body-sm text-neutral-700 hover:bg-neutral-100 cursor-pointer">Settings</a>
      </div>
    }
  </div>
</header>
