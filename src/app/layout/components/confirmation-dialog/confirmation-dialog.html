@if (dialog.isOpen()) {
  <div class="confirmation-dialog-backdrop" (click)="onBackdropClick($event)">
    <div class="confirmation-dialog-panel" role="dialog" aria-modal="true">
      <div class="confirmation-dialog-body">
        <div class="confirmation-dialog-message-row">
          @if (dialog.config()?.icon) {
            <i
              [class]="dialog.config()?.icon"
              class="confirmation-dialog-icon"
              aria-hidden="true"
            ></i>
          }

          <p class="confirmation-dialog-message">
            {{ dialog.config()?.message }}
          </p>
        </div>
      </div>

      <div class="confirmation-dialog-footer">
        <button type="button" class="btn-secondary" (click)="cancel()">Cancel</button>

        <button
          type="button"
          [class]="dialog.config()?.isDeleteAction ? 'btn-danger' : 'btn-primary'"
          (click)="confirm()"
        >
          {{ dialog.config()?.isDeleteAction ? 'Delete' : 'Ok' }}
        </button>
      </div>
    </div>
  </div>
}
