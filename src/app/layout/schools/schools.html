<div class="card">
  <!-- Toolbar -->
  <p-toolbar styleClass="mb-4">
    <ng-template pTemplate="start">
      <div>
        <h2 class="text-3xl font-bold text-slate-800">Schools</h2>

        <p class="text-slate-500">Manage all registered schools</p>
      </div>
    </ng-template>

    <ng-template pTemplate="end">
      <div class="flex items-center gap-3">
        <div class="relative">
          <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"> </i>

          <input
            pInputText
            type="text"
            placeholder="Search schools..."
            class="pl-10 w-80"
            (input)="onGlobalFilter(dt, $event)"
          />
        </div>

        <button pButton label="Add School" icon="pi pi-plus" severity="primary"></button>
      </div>
    </ng-template>
  </p-toolbar>

  <!-- Table -->
  <p-table
    #dt
    [value]="schools()"
    [paginator]="true"
    [rows]="5"
    [rowsPerPageOptions]="[5, 10, 25, 50]"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} schools"
    [globalFilterFields]="['name', 'headOfficeEmailAddress', 'headOfficeTelephoneNumber']"
    sortMode="multiple"
    responsiveLayout="scroll"
    [stripedRows]="true"
    styleClass="p-datatable-gridlines p-datatable-sm pasco-table"
  >
    <!-- Caption -->
    <ng-template pTemplate="caption">
      <div class="flex justify-between items-center">
        <span class="font-medium text-slate-600"> Total Schools: {{ schools().length }} </span>
      </div>
    </ng-template>

    <!-- Header -->
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 80px">Logo</th>

        <th pSortableColumn="name">
          School Name
          <p-sortIcon field="name"></p-sortIcon>
          <p-columnFilter field="name" display="menu"> </p-columnFilter>
        </th>

        <th pSortableColumn="headOfficeEmailAddress">
          Email
          <p-sortIcon field="headOfficeEmailAddress"></p-sortIcon>
          <p-columnFilter field="headOfficeEmailAddress" display="menu"> </p-columnFilter>
        </th>

        <th pSortableColumn="headOfficeTelephoneNumber">
          Telephone
          <p-sortIcon field="headOfficeTelephoneNumber"></p-sortIcon>
        </th>

        <th>Website</th>

        <th style="width: 160px">Actions</th>
      </tr>
    </ng-template>

    <!-- Body -->
    <ng-template pTemplate="body" let-school>
      <tr>
        <!-- Logo -->
        <td>
          <img
            [src]="school.logoUrl"
            [alt]="school.name"
            class="w-12 h-12 object-contain rounded-lg border border-slate-200 p-1 bg-white"
          />
        </td>

        <!-- Name -->
        <td>
          <div class="font-semibold text-slate-800">
            {{ school.name }}
          </div>

          <div class="text-xs text-slate-500">
            {{ school.id }}
          </div>
        </td>

        <!-- Email -->
        <td>
          {{ school.headOfficeEmailAddress }}
        </td>

        <!-- Telephone -->
        <td>
          {{ school.headOfficeTelephoneNumber }}
        </td>

        <!-- Website -->
        <td>
          <a
            *ngIf="school.website"
            [href]="school.website"
            target="_blank"
            class="text-purple-700 hover:underline"
          >
            Visit Website
          </a>

          <span *ngIf="!school.website" class="text-slate-400"> — </span>
        </td>

        <!-- Actions -->
        <td>
          <div class="flex gap-2">
            <button
              pButton
              pTooltip="View"
              icon="pi pi-eye"
              class="p-button-rounded p-button-text"
            ></button>

            <button
              pButton
              pTooltip="Edit"
              icon="pi pi-pencil"
              class="p-button-rounded p-button-text p-button-info"
            ></button>

            <button
              pButton
              pTooltip="Delete"
              icon="pi pi-trash"
              class="p-button-rounded p-button-text p-button-danger"
            ></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <!-- Empty State -->
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6">
          <div class="py-8 text-center">
            <i class="pi pi-building text-4xl text-slate-300"> </i>

            <p class="mt-3 text-slate-500">No schools found</p>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
