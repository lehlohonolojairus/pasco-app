<div class="w-full flex justify-between items-center">
  <pasco-schools-stats [schools]="schools()" />
</div>

<div class="flex flex-col gap-3 pb-2 sm:flex-row sm:items-center sm:justify-between">
  <div></div>
  <button
    type="button"
    class="btn-primary w-full sm:w-auto"
    (click)="addSchool()"
    pTooltip="Add a new school"
    tooltipPosition="top"
  >
    <i class="pi pi-plus mr-2"></i>
    Add School
  </button>
</div>

<p-table
  #dt
  [value]="schools()"
  [loading]="loading()"
  [paginator]="true"
  [rows]="10"
  [rowsPerPageOptions]="[10, 25, 50, 100]"
  [showCurrentPageReport]="true"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords} schools"
  [globalFilterFields]="['name', 'headOfficeEmailAddress', 'headOfficeTelephoneNumber']"
  responsiveLayout="scroll"
  sortMode="multiple"
  styleClass="pasco-table"
>
  <ng-template pTemplate="header">
    <tr>
      <th style="width: 90px">Logo</th>

      <th pSortableColumn="name">
        School
        <p-sortIcon field="name"></p-sortIcon>
        <p-columnFilter field="name" display="menu" type="text"></p-columnFilter>
      </th>

      <th pSortableColumn="headOfficeEmailAddress">
        Email
        <p-sortIcon field="headOfficeEmailAddress"></p-sortIcon>
        <p-columnFilter field="headOfficeEmailAddress" display="menu" type="text"></p-columnFilter>
      </th>

      <th pSortableColumn="headOfficeTelephoneNumber">
        Telephone
        <p-sortIcon field="headOfficeTelephoneNumber"></p-sortIcon>
      </th>

      <th>Website</th>
      <th>Status</th>
      <th style="width: 120px">Actions</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-school>
    <tr>
      <td>
        <img
          [src]="school.logoUrl"
          class="w-12 h-12 object-contain rounded-lg border border-slate-200 p-1 bg-white"
        />
      </td>

      <td>
        <div class="font-semibold text-slate-800">
          {{ school.name }}
        </div>

        <div class="text-xs text-slate-500">
          {{ school.id }}
        </div>
      </td>

      <td>{{ school.headOfficeEmailAddress }}</td>
      <td>{{ school.headOfficeTelephoneNumber }}</td>

      <td>
        @if (!school.website) {
          <span class="text-slate-400">—</span>
        } @else {
          <a [href]="school.website" class="text-purple-700 hover:underline"> Visit Website </a>
        }
      </td>
      <td>
        <p-tag [value]="school.statusName" [severity]="getSeverityClass(school.status)"> </p-tag>
      </td>
      <td>
        <p-button
          type="button"
          icon="pi pi-pencil"
          class="p-button-text p-button-sm"
          (click)="editSchool(school)"
          pTooltip="Edit school details"
          tooltipPosition="top"
        ></p-button>

          <p-button
            type="button"
            icon="pi pi-trash"
            class="p-button-text p-button-sm"
            (click)="deleteSchool(school)"
            pTooltip="Delete school"
            tooltipPosition="top"
            [disabled]="school.status != SchoolStatus.SUSPENDED"
          ></p-button>
      </td>
    </tr>
  </ng-template>
</p-table>
<pasco-create-school-dialog></pasco-create-school-dialog>
