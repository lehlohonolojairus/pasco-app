<div class="card">
  <p-toolbar styleClass="mb-4 !bg-transparent !border-0 !p-0">
    <ng-template pTemplate="start">
      <div>
      </div>
    </ng-template>

    <ng-template pTemplate="end">
      <button
        pButton
        type="button"
        icon="pi pi-plus"
        label="Add School"
        class="pasco-primary-btn"
      ></button>
    </ng-template>
  </p-toolbar>

  <p-table
    #dt
    [value]="schools()"
    dataKey="id"
    [paginator]="true"
    [rows]="5"
    [rowsPerPageOptions]="[5, 10, 25, 50]"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} schools"
    [globalFilterFields]="['name', 'website', 'headOfficeEmailAddress', 'headOfficeTelephoneNumber', 'headOfficeFaxNumber']"
    responsiveLayout="scroll"
    sortMode="multiple"
    [stripedRows]="true"
    showGridlines
    styleClass="pasco-table p-datatable-sm"
    [tableStyle]="{ 'min-width': '72rem' }"
    paginatorDropdownAppendTo="body"
  >


    <ng-template pTemplate="header">
      <tr>
        <th class="w-24">
          <span class="text-sm font-semibold">Logo</span>
        </th>

        <th pSortableColumn="name">
          <div class="flex items-center justify-between gap-2">
            <span class="text-sm font-semibold">Name</span>
            <div class="flex items-center gap-2">
              <p-sortIcon field="name"></p-sortIcon>
              <p-columnFilter type="text" field="name" display="menu"></p-columnFilter>
            </div>
          </div>
        </th>

        <th pSortableColumn="headOfficeEmailAddress">
          <div class="flex items-center justify-between gap-2">
            <span class="text-sm font-semibold">Email</span>
            <div class="flex items-center gap-2">
              <p-sortIcon field="headOfficeEmailAddress"></p-sortIcon>
              <p-columnFilter type="text" field="headOfficeEmailAddress" display="menu"></p-columnFilter>
            </div>
          </div>
        </th>

        <th pSortableColumn="headOfficeTelephoneNumber">
          <div class="flex items-center justify-between gap-2">
            <span class="text-sm font-semibold">Telephone</span>
            <div class="flex items-center gap-2">
              <p-sortIcon field="headOfficeTelephoneNumber"></p-sortIcon>
              <p-columnFilter type="text" field="headOfficeTelephoneNumber" display="menu"></p-columnFilter>
            </div>
          </div>
        </th>

        <th pSortableColumn="website">
          <div class="flex items-center justify-between gap-2">
            <span class="text-sm font-semibold">Website</span>
            <div class="flex items-center gap-2">
              <p-sortIcon field="website"></p-sortIcon>
              <p-columnFilter type="text" field="website" display="menu"></p-columnFilter>
            </div>
          </div>
        </th>

        <th class="w-28">
          <span class="text-sm font-semibold">Actions</span>
        </th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-school>
      <tr>
        <td>
          @if (school.logoUrl) {
            <img
              [src]="school.logoUrl"
              [alt]="school.name"
              class="h-12 w-16 rounded-md object-contain bg-white"
            />
          } @else {
            <div class="flex h-12 w-16 items-center justify-center rounded-md bg-[var(--color-neutral-100)] text-xs text-[var(--color-neutral-700)]">
              No logo
            </div>
          }
        </td>

        <td>
          <div class="font-medium text-[var(--color-neutral-900)]">{{ school.name }}</div>
        </td>

        <td>
          <a
            [href]="'mailto:' + school.headOfficeEmailAddress"
            class="text-[var(--color-pasco-purple)] hover:underline"
          >
            {{ school.headOfficeEmailAddress || '—' }}
          </a>
        </td>

        <td>{{ school.headOfficeTelephoneNumber || '—' }}</td>

        <td>
          @if (school.website) {
            <a
              [href]="school.website"
              target="_blank"
              rel="noopener noreferrer"
              class="text-[var(--color-pasco-purple)] hover:underline"
            >
              {{ school.website }}
            </a>
          } @else {
            <span>—</span>
          }
        </td>

        <td>
          <div class="flex items-center gap-2">
            <button
              pButton
              type="button"
              icon="pi pi-pencil"
              [text]="true"
              class="!h-9 !w-9 !text-[var(--color-pasco-purple)] hover:!bg-[color-mix(in_srgb,var(--color-pasco-purple)_10%,white)]"
            ></button>

            <button
              pButton
              type="button"
              icon="pi pi-eye"
              [text]="true"
              class="!h-9 !w-9 !text-[var(--color-pasco-orange)] hover:!bg-[color-mix(in_srgb,var(--color-pasco-orange)_10%,white)]"
            ></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="py-8 text-center text-sm text-[var(--color-neutral-700)]">
          No schools found.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
